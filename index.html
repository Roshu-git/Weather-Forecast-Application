<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- tailwind link -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font family link -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <!-- Custom Css Link -->
    <link rel="stylesheet" href="assets/css/style.css">
    <title>Weather Forcast Application</title>
</head>
<body>
    <!-- Sidemenu section -->
    <header>
         <div class="wf-header-wrapper flex flex-col align-center">
            <div class="wf-logo ">
                <a href="index.html">
                    <img src="assets/images/weather-logo.png" alt="logo">
                </a>
            </div>
            <div class="wf-menus">
                <button id="weather" class="nav-btn active">
                    <img src="assets/images/wf-icon1.png" alt="image">
                    <span >Weather</span>
                </button>
            </div>
         </div>
    </header>
    <!-- Main section -->
    <main>
        <div class="wf-curent-sec">
            <div class="wf-weathersec">
                <div class="wf-searc-wrap flex align-center w-full gap-4">
                    <!-- Search section -->
                    <div class="wf-search-sec w-full">
                        <input type="text" class="search-text" id="searchcity" placeholder="Search for cities" />
                        <button id="searchbtn" class="wf-btn wf-searchbtn" >Search</button>
                        <span class="error"></span>
                        <select id="wf-recentCities" class="wf-recentoption" style="display: none;">
                            <option value="">Recently Searched Cities</option>
                        </select>
                    </div>
                    <!-- toggle section -->
                    <div class="wf-toggle-btn w-full">
                        <label class="wf-switch">
                            <input type="checkbox" id="unitToggle">
                            <span class="wf-slider">
                                <span class="celsius">°C</span>
                                <span class="fahrenheit">°F</span>
                            </span>
                        </label>
                    </div>
                </div>
                <!-- Weather Alert section -->
                <div id="wf-weatheralert" class="hidden flex gap-10 align-center">
                <div class="wf-weaalert flex gap-10 align-center">
                    <div class="wf-weasunalert">
                        <img src="assets/images/weather-alert.png" alt="alert">
                    </div>
                    <div class="wf-weathertext">
                        <h4 class="font-semibold"> ⚠ Extream Heat Alert</h4>
                        <p>Temprature is above 40°C. <br />Stay hydrated and avoid direct sunlight.</p>
                    </div>
                    <div class="wf-weathersun">
                        <img src="assets/images/sun.png" alt="sun">
                    </div> 
                    <div class="wf-weatheral-close">
                        <button id="wf-closealert">
                        <img src="assets/images/close.png" alt="close">
                        </button>
                    </div>
                </div>
                </div>
                <div class="wf-weatherinner flex w-full gap-7">
                    <div class="wf-weather-left w-full w-1/2">
                        <!-- <div class="wf-searc-wrap flex align-center w-full gap-4">
                        <!-- Search section ->
                        <div class="wf-search-sec w-full">
                            <input type="text" class="search-text" id="searchcity" placeholder="Search for cities" />
                            <button id="searchbtn" class="wf-btn wf-searchbtn" >Search</button>
                            <span class="error"></span>
                            <select id="wf-recentCities" class="wf-recentoption" style="display: none;">
                                <option value="">Recently Searched Cities</option>
                            </select>
                        </div>
                        <div class="wf-toggle-btn w-full">
                            <label class="wf-switch">
                                <input type="checkbox" id="unitToggle">
                                <span class="wf-slider">
                                    <span class="celsius">°C</span>
                                    <span class="fahrenheit">°F</span>
                                </span>
                            </label>
                        </div>
                        </div> -->   
                        <!-- Show Current weather  -->
                    <div id="wf-curweather"></div>
                </div>
                <div class="wf-weather-right w-full w-1/2 ">
                    <!-- 5-day Forecast shown -->
                    <h2 class="wf-heading">5-Day Forecast</h2>
                    <div class="wf-forecastcont flex flex-col gap-5" id="wf-forecastcontainer">
                    </div>
                </div>
            </div>
            </div>
        </div>
    </main>

    <!-- custom-js -->
    <script src="assets/js/custom.js"></script>
</body>
</html>
